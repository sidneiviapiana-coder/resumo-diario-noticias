<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Resumo Diário de Notícias</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #070a0f;
      --paper: #111720;
      --ink: #f4ead6;
      --muted: #aeb7c3;
      --line: #303744;
      --gold: #d8a45f;
      --link: #8cc8ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at top, rgba(216,164,95,.10), transparent 420px), var(--bg);
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
      line-height: 1.45;
    }
    main {
      width: min(980px, calc(100% - 32px));
      margin: 28px auto;
      background: var(--paper);
      border: 1px solid var(--line);
      padding: 28px;
    }
    header {
      text-align: center;
      border-top: 1px solid var(--gold);
      border-bottom: 4px double var(--gold);
      padding: 14px 0 16px;
      margin-bottom: 20px;
    }
    .kicker {
      font: 700 12px Arial, sans-serif;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--gold);
    }
    h1 {
      margin: 6px 0 4px;
      font-size: clamp(34px, 6vw, 62px);
      line-height: .95;
      text-transform: uppercase;
    }
    .date {
      font: 13px Arial, sans-serif;
      color: var(--muted);
    }
    .latest {
      border-left: 4px solid var(--gold);
      background: #171d28;
      padding: 14px 16px;
      margin-bottom: 20px;
    }
    h2 {
      margin: 0 0 10px;
      font: 800 16px Arial, sans-serif;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--gold);
    }
    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }
    .button {
      display: inline-block;
      border: 1px solid var(--gold);
      padding: 9px 12px;
      font: 700 13px Arial, sans-serif;
      color: var(--ink);
    }
    .archive-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .archive-list li {
      border-top: 1px solid var(--line);
      padding-top: 10px;
      font: 14px Arial, sans-serif;
    }
    footer {
      margin-top: 24px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font: 12px Arial, sans-serif;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="kicker">Boletim matinal</div>
      <h1>Resumo Diário</h1>
      <div class="date">Atualizado diariamente a partir das 08:00</div>
    </header>

    <section class="latest">
      <h2>Última edição</h2>
      <p><strong>10/05/2026</strong> - Prévia inicial do boletim diário.</p>
      <div class="actions">
        <a class="button" href="archive/2026-05-10.html">Abrir HTML</a>
        <a class="button" href="pdf/2026-05-10.pdf">Abrir PDF</a>
      </div>
    </section>

    <section>
      <h2>Histórico</h2>
      <ul class="archive-list">
        <li><strong>10/05/2026</strong> · <a href="archive/2026-05-10.html">HTML</a> · <a href="pdf/2026-05-10.pdf">PDF</a></li>
      </ul>
    </section>

    <footer>
      Mantém histórico dos últimos 30 dias. Links de notícias e vídeos ficam dentro de cada edição.
    </footer>
  </main>
</body>
</html>
